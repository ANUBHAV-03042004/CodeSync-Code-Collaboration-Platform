# ── Service ───────────────────────────────────────────────────────────────────
# Internal cluster DNS: api-gateway.YOUR_NAMESPACE.svc.cluster.local:8080
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    project: codesync
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP

---
# ── Route ─────────────────────────────────────────────────────────────────────
# OpenShift Route = public HTTPS URL automatically provisioned.
# After applying, your Gateway is reachable at:
#   https://api-gateway-YOUR_NAMESPACE.apps.sandbox-m2.ll9k3s.p1.openshiftapps.com
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    project: codesync
spec:
  to:
    kind: Service
    name: api-gateway
  port:
    targetPort: http
  tls:
    # Edge termination: OpenShift handles TLS, forwards plain HTTP to the pod.
    # This is correct for Spring Cloud Gateway — no additional SSL config needed.
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
