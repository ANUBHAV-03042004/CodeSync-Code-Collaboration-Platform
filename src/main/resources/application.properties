# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=eureka-server
server.port=8761
spring.profiles.active=prod
# ── Security — dashboard credentials ─────────────────────────────────────────
# Change these in production via environment variables
spring.security.user.name=${EUREKA_USERNAME}
spring.security.user.password=${EUREKA_PASSWORD}

# ── Eureka Server — do NOT register with itself ───────────────────────────────
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@localhost:${server.port}/eureka/

# ── Server tuning ─────────────────────────────────────────────────────────────
# How long to wait before evicting a service that stops sending heartbeats (seconds)
eureka.server.eviction-interval-timer-in-ms=5000

# Disable self-preservation in dev so stale instances are removed quickly.
# Set to true in production.
eureka.server.enable-self-preservation=false
eureka.server.renewal-percent-threshold=0.85

# ── Instance info ─────────────────────────────────────────────────────────────
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.netflix.eureka=INFO
logging.level.com.netflix.discovery=INFO
logging.level.org.springframework.cloud.netflix.eureka=INFO
