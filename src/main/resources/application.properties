# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=file-service
server.port=8083

# FIX 1: Must be NATIVE (not framework) for OpenShift HAProxy ingress.
# "framework" only works with Spring Cloud Gateway as the proxy.
# NATIVE tells Tomcat's valve to read X-Forwarded-Proto directly,
# so SpringDoc sees https:// and Swagger UI shows the correct server URL.
server.forward-headers-strategy=NATIVE

# ── DataSource (TiDB — MySQL-compatible) ──────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com:4000/codesync_file?sslMode=REQUIRED&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT (extracts userId from Bearer token when X-User-Id header is absent) ───
jwt.secret=${JWT_SECRET}

# ── Eureka ────────────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://admin:${EUREKA_PASSWORD}@eureka-service:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30
eureka.instance.status-page-url=${SERVER_URL}/actuator/info
eureka.instance.health-check-url=${SERVER_URL}/actuator/health
eureka.instance.home-page-url=${SERVER_URL}/

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# ── Swagger / SpringDoc ───────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
# FIX 2: Explicitly register the OpenShift production URL as a Swagger server.
# server.forward-headers-strategy=NATIVE handles it automatically at runtime,
# but this fallback ensures the URL appears even if the proxy header is missing.
springdoc.swagger-ui.servers[0].url=${SERVER_URL}
springdoc.swagger-ui.servers[0].description=Current deployment

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.fileservice.codesync=DEBUG
logging.level.org.springframework.security=INFO
