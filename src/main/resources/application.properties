# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=execution-service
server.port=8085

# FIX: NATIVE required for OpenShift HAProxy — makes SpringDoc detect https://
server.forward-headers-strategy=NATIVE

# ── DataSource (TiDB — MySQL-compatible) ──────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── RabbitMQ — CloudAMQP SSL on port 5671 ────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT:5671}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASS}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST}
spring.rabbitmq.ssl.enabled=${RABBITMQ_SSL:true}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.connection-timeout=10000ms
spring.rabbitmq.requested-heartbeat=60s
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.concurrency=3
spring.rabbitmq.listener.simple.max-concurrency=10
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000ms
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000ms

# FIX: Prevent AmqpIOException on startup (same fix as collab-service).
# RabbitAdmin tries to declare queues on startup before TLS handshake completes.
# auto-startup=false defers declaration until first use — after connection is ready.
spring.rabbitmq.listener.simple.auto-startup=false

# ── Eureka ────────────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://admin:${EUREKA_PASSWORD}@eureka-service:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30
eureka.instance.status-page-url=${SERVER_URL}/actuator/info
eureka.instance.health-check-url=${SERVER_URL}/actuator/health
eureka.instance.home-page-url=${SERVER_URL}/

# FIX: Eureka HTTP client tuning — prevents NoClassDefFoundError on HttpVersionPolicy
# from exhausting the connection pool and blocking registration forever.
# These settings are only fully effective after adding httpcore5-h2 to pom.xml.
eureka.client.eureka-server-connect-timeout-seconds=5
eureka.client.eureka-server-read-timeout-seconds=8
eureka.client.eureka-server-total-connections=5
eureka.client.eureka-server-total-connections-per-host=5
eureka.client.eureka-connection-idle-timeout-seconds=30
eureka.client.num-eureka-servers-retry-count=1
eureka.client.eureka-service-url-poll-interval-seconds=300
eureka.client.registry-fetch-interval-seconds=30

# ── Sandbox ───────────────────────────────────────────────────────────────────
# Switched from piston to jdoodle — public Piston API is whitelist-only since 2025-02-15
sandbox.provider=jdoodle
sandbox.max-execution-seconds=10
sandbox.max-memory-mb=256

# ── Piston API (default sandbox — no Docker needed) ───────────────────────────
# JDoodle credentials — injected from execution-service-secrets
# Patch secret: oc patch secret execution-service-secrets -p '{"stringData":{"JDOODLE_CLIENT_ID":"<id>","JDOODLE_CLIENT_SECRET":"<secret>"}}'

# ── Docker socket (only when sandbox.provider=docker) ────────────────────────
docker.host=${DOCKER_HOST:unix:///var/run/docker.sock}
sandbox.network-disabled=true

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# FIX: Exclude rabbit from health and readiness so the pod stays UP
# even when CloudAMQP TLS handshake is slow or temporarily unavailable.
# Without this the readiness probe fails → OpenShift restarts the pod in a loop.
management.health.rabbit.enabled=false
management.endpoint.health.group.readiness.exclude=rabbit
management.endpoint.health.validate-group-membership=false

# ── Swagger / SpringDoc ───────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.persistAuthorization=true
springdoc.swagger-ui.operations-sorter=alpha
# Server URL injected from secret via SwaggerConfig.java — do NOT set
# springdoc.swagger-ui.servers[] here because an unresolved ${SERVER_URL}
# placeholder renders as "/" in the Swagger UI dropdown.

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.executionservice.codesync=DEBUG
logging.level.org.springframework.amqp=INFO
logging.level.com.netflix.discovery=INFO

# ── JDoodle credentials (active when sandbox.provider=jdoodle) ────────────────
# Get free credentials at: https://www.jdoodle.com/compiler-api
# Free tier: 200 executions/day — resets midnight UTC
# Add to secret: oc patch secret execution-service-secrets -p '{"stringData":{"JDOODLE_CLIENT_ID":"your-id","JDOODLE_CLIENT_SECRET":"your-secret"}}'
JDOODLE_CLIENT_ID=${JDOODLE_CLIENT_ID:}
JDOODLE_CLIENT_SECRET=${JDOODLE_CLIENT_SECRET:}

# ── Piston URL (active when sandbox.provider=piston) ─────────────────────────
sandbox.piston-url=${PISTON_URL:https://emkc.org/api/v2/piston}
