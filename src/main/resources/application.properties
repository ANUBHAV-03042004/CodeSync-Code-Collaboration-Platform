# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=auth-service
server.port=8081

# ── DataSource ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com:4000/test?sslMode=REQUIRED}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true


spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=900000
jwt.refresh-expiration-ms=604800000

# ── Inactivity Auto-Logout ────────────────────────────────────────────────────
jwt.inactivity-timeout-ms=1800000

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ── Eureka ────────────────────────────────────────────────────────────────────
# Internal cluster DNS (pod-to-pod) — primary
# External OpenShift route — fallback shown in Eureka dashboard
eureka.client.service-url.defaultZone=http://admin:${EUREKA_PASSWORD}@eureka-service:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${SERVER_URL}
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30
# Make the Eureka dashboard link clickable and correct
eureka.instance.status-page-url=${SERVER_URL:http://localhost:8081}/actuator/info
eureka.instance.health-check-url=${SERVER_URL:http://localhost:8081}/actuator/health
eureka.instance.home-page-url=${SERVER_URL:http://localhost:8081}/

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# ── Swagger / SpringDoc ───────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
# Server list is managed exclusively by SwaggerConfig.java OpenAPI bean.

logging.level.com.authservice.codesync=DEBUG
logging.level.org.springframework.security=INFO

# ── Mail (SMTP) ───────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── App ───────────────────────────────────────────────────────────────────────
app.name=CodeSync
app.frontend-url=${FRONTEND_URL}