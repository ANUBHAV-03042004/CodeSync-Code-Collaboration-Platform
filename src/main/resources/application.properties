# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=collab-service
server.port=8084

# FIX: NATIVE required for OpenShift HAProxy — framework only works with Spring Cloud Gateway
server.forward-headers-strategy=NATIVE

# ── DataSource ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com:4000/codesync_collab?sslMode=REQUIRED&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ── RabbitMQ — CloudAMQP (TLS on port 5671) ──────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST:gerbil-01.rmq.cloudamqp.com}
spring.rabbitmq.port=${RABBITMQ_PORT:5671}
spring.rabbitmq.username=${RABBITMQ_USER:mrlnqfcg}
spring.rabbitmq.password=${RABBITMQ_PASS}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:mrlnqfcg}
spring.rabbitmq.ssl.enabled=true

# FIX 1: Do NOT declare exchanges/queues on startup.
# RabbitAdmin tries to declare all @Bean queues immediately on connection.
# If the TLS handshake takes longer than the connection timeout the declare
# fails with AmqpIOException before the app is even ready.
# Queues/exchanges already exist on CloudAMQP — no need to redeclare.
spring.rabbitmq.listener.simple.auto-startup=false

# Publisher confirms
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.connection-timeout=10000ms
spring.rabbitmq.requested-heartbeat=60s

# Consumer reliability
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=3000ms
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2.0

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ── Eureka ────────────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://admin:${EUREKA_PASSWORD}@eureka-service:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30
eureka.instance.status-page-url=${SERVER_URL:http://localhost:8084}/actuator/info
eureka.instance.health-check-url=${SERVER_URL:http://localhost:8084}/actuator/health
eureka.instance.home-page-url=${SERVER_URL:http://localhost:8084}/

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.persistAuthorization=true
# Server list comes from SwaggerConfig.java (normalises http→https automatically).
# Do NOT override servers here — springdoc property-level server injection
# does not apply the same normalisation and would re-introduce the mixed-content block.

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.collabservice.codesync=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web.socket=INFO
logging.level.org.springframework.amqp=DEBUG
