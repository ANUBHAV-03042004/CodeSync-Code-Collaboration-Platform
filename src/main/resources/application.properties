# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=api-gateway-service
server.port=8080

# ── Spring Cloud Gateway ──────────────────────────────────────────────────────
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# CORS handled by CorsConfig.java bean

# ── Header forwarding ─────────────────────────────────────────────────────────
# CRITICAL: These two settings together ensure auth-service sees the gateway's
# public hostname (not its internal pod IP) when it constructs redirect URIs.
# Without them, Spring Security builds redirect_uri=http://10.x.x.x:8081/...
# which never matches what's registered in Google/GitHub console.
server.forward-headers-strategy=framework
spring.cloud.gateway.x-forwarded.enabled=true

# ── Routes ────────────────────────────────────────────────────────────────────
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

# OAuth2 flows MUST route to auth-service without JwtAuthFilter —
# these paths carry no JWT, they carry the OAuth2 state/code parameters.
spring.cloud.gateway.routes[1].id=auth-oauth2
spring.cloud.gateway.routes[1].uri=lb://auth-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/oauth2/**, /login/oauth2/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[2].id=project-service
spring.cloud.gateway.routes[2].uri=lb://project-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/projects/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=0
spring.cloud.gateway.routes[2].filters[1].name=JwtAuthFilter

spring.cloud.gateway.routes[3].id=file-service
spring.cloud.gateway.routes[3].uri=lb://file-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/files/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=0
spring.cloud.gateway.routes[3].filters[1].name=JwtAuthFilter

spring.cloud.gateway.routes[4].id=collab-service
spring.cloud.gateway.routes[4].uri=lb://collab-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/sessions/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=0
spring.cloud.gateway.routes[4].filters[1].name=JwtAuthFilter

spring.cloud.gateway.routes[5].id=collab-websocket
spring.cloud.gateway.routes[5].uri=lb:ws://collab-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/ws/collab/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[6].id=execution-service
spring.cloud.gateway.routes[6].uri=lb://execution-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/executions/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=0
spring.cloud.gateway.routes[6].filters[1].name=JwtAuthFilter

spring.cloud.gateway.routes[7].id=execution-websocket
spring.cloud.gateway.routes[7].uri=lb:ws://execution-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/ws/execution/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[8].id=version-service
spring.cloud.gateway.routes[8].uri=lb://version-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/versions/**
spring.cloud.gateway.routes[8].filters[0]=StripPrefix=0
spring.cloud.gateway.routes[8].filters[1].name=JwtAuthFilter

spring.cloud.gateway.routes[9].id=comment-service
spring.cloud.gateway.routes[9].uri=lb://comment-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/v1/comments/**
spring.cloud.gateway.routes[9].filters[0]=StripPrefix=0
spring.cloud.gateway.routes[9].filters[1].name=JwtAuthFilter

spring.cloud.gateway.routes[10].id=notification-service
spring.cloud.gateway.routes[10].uri=lb://notification-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/v1/notifications/**
spring.cloud.gateway.routes[10].filters[0]=StripPrefix=0
spring.cloud.gateway.routes[10].filters[1].name=JwtAuthFilter

spring.cloud.gateway.routes[11].id=notification-websocket
spring.cloud.gateway.routes[11].uri=lb:ws://notification-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/ws/notifications/**
spring.cloud.gateway.routes[11].filters[0]=StripPrefix=0

# ── Eureka ────────────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://admin:${EUREKA_PASSWORD:admin}@eureka-service:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always
# CRITICAL FIX: enables /actuator/health/liveness and /actuator/health/readiness.
# Without this, both endpoints return 404. The deployment.yaml readiness probe
# hits /actuator/health/readiness — a 404 causes Kubernetes to mark the container
# as never-ready, which is why PodReadyToStartContainers stays False.
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.apigatewayservice.codesync=DEBUG