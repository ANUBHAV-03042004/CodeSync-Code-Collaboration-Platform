# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=auth-service
server.port=8081
server.forward-headers-strategy=framework

# ── DataSource ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com:4000/test?sslMode=REQUIRED}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Google OAuth2 ─────────────────────────────────────────────────────────────
# FIX: redirect-uri must point to the API GATEWAY public URL, NOT the auth-service
# internal URL. OAuth providers (Google, GitHub) call back to whatever URI is
# registered in their developer console. The gateway forwards the callback to
# auth-service via the auth-oauth2 route. Using the auth-service URL directly
# bypasses the gateway and causes "redirect_uri_mismatch" from both providers.
# The {baseUrl} and {registrationId} placeholders are resolved by Spring at runtime
# from the incoming request host (which is the gateway URL because
# server.forward-headers-strategy=framework is set).
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ── OAuth2 base URI override ──────────────────────────────────────────────────
# CRITICAL FIX for 401 invalid_token_response:
# Without this, Spring uses the incoming request host to build the redirect_uri
# for the token exchange. Behind the gateway, the request host is the internal
# pod address (10.x.x.x:8081), not the gateway public URL. Google rejects the
# token exchange because the redirect_uri doesn't match what's registered in
# Google Cloud Console. Setting this explicitly forces the correct public URI.
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# ── GitHub OAuth2 ─────────────────────────────────────────────────────────────
# Same fix — use {baseUrl}/{registrationId} placeholders so the redirect URI
# is automatically derived from the forwarded host (= gateway public URL).
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=900000
jwt.refresh-expiration-ms=604800000

# ── Inactivity Auto-Logout ────────────────────────────────────────────────────
jwt.inactivity-timeout-ms=3600000

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
spring.data.redis.timeout=2000ms
management.health.redis.enabled=false

# ── Spring Session (Redis) ────────────────────────────────────────────────────
# Stores OAuth2 authorization-request state in Redis so it survives across
# gateway hops and multiple auth-service pod replicas.
# The SameSite=None + Secure flags are required so the browser includes the
# JSESSIONID cookie on the cross-origin callback from Google / GitHub.
spring.session.store-type=redis
spring.session.redis.namespace=authsvc:session
spring.session.timeout=5m
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

management.health.mail.enabled=false

# ── Eureka ────────────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://admin:${EUREKA_PASSWORD}@eureka-service:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
# FIX: was ${SERVER_URL} with no default — if the env var is unset the registration
# hostname is blank, the gateway's lb://auth-service resolves nothing, and every
# proxied OAuth2 callback returns 503. Default to the k8s service DNS name.
eureka.instance.hostname=auth-service
eureka.instance.instance-id=${spring.application.name}:${server.port}
app.public-url=${SERVER_URL:http://localhost:8081}
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30
eureka.instance.status-page-url=${SERVER_URL:http://localhost:8081}/actuator/info
eureka.instance.health-check-url=${SERVER_URL:http://localhost:8081}/actuator/health
eureka.instance.home-page-url=${SERVER_URL:http://localhost:8081}/

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# ── Swagger / SpringDoc ───────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.authservice.codesync=DEBUG
logging.level.org.springframework.security=INFO

# ── Mail (SMTP) ───────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── App ───────────────────────────────────────────────────────────────────────
app.name=YoursCode
app.frontend-url=${FRONTEND_URL:https://yourscode.netlify.app}
app.allowed-origins=${ALLOWED_ORIGINS:https://yourscode.netlify.app}