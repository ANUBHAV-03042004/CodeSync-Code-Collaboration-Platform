apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-service
  labels:
    app: api-gateway-service
    project: codesync
spec:
  replicas: 1
  # Recreate: kills old pod BEFORE starting new one.
  # Prevents the "two pods, split Eureka registrations" problem during rollouts.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: api-gateway-service
  template:
    metadata:
      labels:
        app: api-gateway-service
        project: codesync
    spec:
      # Give the pod 30s to deregister from Eureka before being killed
      terminationGracePeriodSeconds: 30
      containers:
        - name: api-gateway-service
          image: image-registry.openshift-image-registry.svc:5000/mr-aksthegreat030420-dev/api-gateway-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: JWT_SECRET
            - name: EUREKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: EUREKA_PASSWORD
            # FIX: tell Spring Boot to load the ConfigMap-mounted application.properties
            # in addition to (and overriding) the bundled one inside the jar.
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: "file:/config/"
          # FIX: mount the ConfigMap so the pod actually uses it.
          # Without this volumeMount the ConfigMap existed but was never applied,
          # leaving EUREKA_DEFAULT_ZONE unresolved and Eureka discovery broken.
          volumeMounts:
            - name: config-volume
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            # FIX: 30s was too short. Spring Cloud Gateway needs ~45-60s on cold
            # start to: load application context → connect to Eureka → fetch registry
            # → mark routes UP. Probe fired before boot completed → 404/503 →
            # failureThreshold hit → container killed before it ever became ready.
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
      volumes:
        - name: config-volume
          configMap:
            name: api-gateway-config
