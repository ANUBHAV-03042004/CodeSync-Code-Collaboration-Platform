apiVersion: apps/v1
kind: Deployment
metadata:
  name: version-service
  labels:
    app: version-service
    project: codesync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: version-service
  template:
    metadata:
      labels:
        app: version-service
        project: codesync
    spec:
      containers:
        - name: version-service
          image: image-registry.openshift-image-registry.svc:5000/mr-aksthegreat030420-dev/version-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8086
              name: http
          envFrom:
            - secretRef:
                name: version-service-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8086
            initialDelaySeconds: 70
            periodSeconds: 15
            failureThreshold: 3
