apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: image-registry.openshift-image-registry.svc:5000/mr-aksthegreat030420-dev/auth-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - secretRef:
                name: auth-service-secrets
          # FRONTEND_URL and ALLOWED_ORIGINS override — takes precedence over the secret value
          env:
            - name: FRONTEND_URL
              value: "https://yourscode.netlify.app"
            - name: ALLOWED_ORIGINS
              value: "https://yourscode.netlify.app"
            # CRITICAL FIX for 401 invalid_token_response:
            # SERVER_URL is used by eureka.instance.hostname and as the base for
            # OAuth2 redirect URIs. Must be the gateway public URL so Google token
            # exchange uses the correct registered redirect_uri.
            - name: SERVER_URL
              value: "https://api-gateway-service-mr-aksthegreat030420-dev.apps.rm1.0a51.p1.openshiftapps.com"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
