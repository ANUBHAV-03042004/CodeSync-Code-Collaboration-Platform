apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-service
  labels:
    app: api-gateway-service
    project: codesync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway-service
  template:
    metadata:
      labels:
        app: api-gateway-service
        project: codesync
    spec:
      containers:
        - name: api-gateway-service
          image: image-registry.openshift-image-registry.svc:5000/mr-aksthegreat030420-dev/api-gateway-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP

          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: JWT_SECRET

            - name: EUREKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: EUREKA_PASSWORD

            - name: EUREKA_HOST
              valueFrom:
                configMapKeyRef:
                  name: api-gateway-config
                  key: EUREKA_HOST

            - name: EUREKA_DEFAULT_ZONE
              value: "https://admin:$(EUREKA_PASSWORD)@$(EUREKA_HOST)/eureka/"

            - name: SPRING_CONFIG_LOCATION
              value: "classpath:/,file:/config/application.properties"

          volumeMounts:
            - name: app-config
              mountPath: /config
              readOnly: true

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

      volumes:
        - name: app-config
          configMap:
            name: api-gateway-config
            items:
              - key: application.properties
                path: application.properties